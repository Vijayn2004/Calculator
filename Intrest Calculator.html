<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterestWise Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7fa; color: #2d3436; }
        
        /* Custom Premium Slider */
        .slider-custom { -webkit-appearance: none; width: 100%; height: 5px; background: #dfe6e9; border-radius: 10px; outline: none; margin: 15px 0; }
        .slider-custom::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #0054a6; border-radius: 50%; cursor: pointer; border: 4px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: 0.2s ease-in-out; }
        .slider-custom::-webkit-slider-thumb:hover { background: #0984e3; transform: scale(1.15); }

        .card-main { border-radius: 24px; border: none; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .input-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; transition: 0.3s; }
        .input-box:focus-within { border-color: #0054a6; background: #fff; box-shadow: 0 0 0 3px rgba(0,84,166,0.1); }
        
        .btn-invest { background: linear-gradient(135deg, #0054a6 0%, #0984e3 100%); color: white; border-radius: 12px; transition: 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center; font-weight: 600; gap: 10px; }
        .btn-invest:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(9, 132, 227, 0.3); color: white; }

        .result-card { background: #ffffff; border-radius: 16px; padding: 15px; border: 1px solid #edf2f7; }
        
        @media (max-width: 768px) {
            .main-row { flex-direction: column-reverse; } /* Key info stays top on mobile */
            .chart-container { height: 200px !important; width: 200px !important; }
			.chart-center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; pointer-events: none; }
        }
    </style>
</head>
<body class="py-3 px-2">

<div class="container max-w-6xl">
    <header class="flex justify-between items-center mb-4 px-2">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Interest <span class="text-blue-600">Wise</span></h1>
            <p class="text-xs text-slate-500 font-medium">Compound Interest Intelligence</p>
        </div>

    </header>

    <div class="card card-main bg-white overflow-hidden shadow">
        <div class="row g-0 main-row">
            <div class="col-lg-6 p-4 md:p-8">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-sliders-h text-blue-600"></i> Configure Investment
                </h2>

                <div class="mb-8">
                    <div class="flex justify-between items-end mb-2">
                        <label class="text-sm font-semibold text-slate-600 uppercase tracking-wider">Principal Amount</label>
                        <div class="input-box px-3 py-1 flex items-center">
                            <span class="text-slate-400 font-bold mr-1">₹</span>
                            <input type="number" id="principal-text" class="bg-transparent border-0 text-right font-bold text-blue-700 focus:outline-none w-24" value="100000">
                        </div>
                    </div>
                    <input type="range" id="principal-range" class="slider-custom" min="1000" max="10000000" step="1000" value="100000">
                </div>

                <div class="mb-8">
                    <div class="flex justify-between items-end mb-2">
                        <label class="text-sm font-semibold text-slate-600 uppercase tracking-wider">Interest Rate (p.a)</label>
                        <div class="input-box px-3 py-1 flex items-center">
                            <input type="number" id="rate-text" class="bg-transparent border-0 text-right font-bold text-blue-700 focus:outline-none w-16" value="12">
                            <span class="text-slate-400 font-bold ml-1">%</span>
                        </div>
                    </div>
                    <input type="range" id="rate-range" class="slider-custom" min="1" max="50" step="0.1" value="12">
                </div>

                <div class="mb-8">
                    <div class="flex justify-between items-end mb-2">
                        <label class="text-sm font-semibold text-slate-600 uppercase tracking-wider">Time Period</label>
                        <div class="input-box px-3 py-1 flex items-center">
                            <input type="number" id="time-text" class="bg-transparent border-0 text-right font-bold text-blue-700 focus:outline-none w-16" value="10">
                            <span class="text-slate-400 font-bold ml-1">Yrs</span>
                        </div>
                    </div>
                    <input type="range" id="time-range" class="slider-custom" min="1" max="30" step="1" value="10">
                </div>
            </div>

            <div class="col-lg-6 bg-slate-50 p-4 md:p-8 flex flex-col items-center justify-center">
                <div class="grid grid-cols-2 gap-3 w-full mb-8">
                    <div class="result-card">
                        <p class="text-[10px] uppercase font-bold text-slate-400 mb-1">Total Invested</p>
                        <p id="res-invested" class="text-lg font-bold text-slate-800">₹ 0</p>
                    </div>
                    <div class="result-card">
                        <p class="text-[10px] uppercase font-bold text-slate-400 mb-1">Total Returns</p>
                        <p id="res-returns" class="text-lg font-bold text-green-600">₹ 0</p>
                    </div>
                </div>

                <div class="relative flex items-center justify-center mb-8">
                    <div class="chart-container" style="width: 260px; height: 260px;">
                        <canvas id="mainChart"></canvas>
                    </div>
                    <div class="absolute text-center">
                        <p class="text-[10px] text-slate-400 uppercase font-bold">Total Value</p>
                        <p id="res-total" class="text-xl font-extrabold text-blue-900">₹ 0</p>
                    </div>
                </div>

                <div class="w-full space-y-3">
                    <div class="flex items-center justify-between text-sm bg-white p-3 rounded-xl">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-blue-600"></div>
                            <span class="text-slate-600">Principal</span>
                        </div>
                        <span id="perc-principal" class="font-bold text-slate-800">0%</span>
                    </div>
                    <div class="flex items-center justify-between text-sm bg-white p-3 rounded-xl">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                            <span class="text-slate-600">Interest Earned</span>
                        </div>
                        <span id="perc-interest" class="font-bold text-slate-800">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <p class="text-center text-slate-400 text-[10px] mt-6 px-4">
        *Disclaimer: Investment calculations are based on compound interest. Market risks apply.
    </p>
</div>

<script>
    const principalRange = document.getElementById('principal-range');
    const principalText = document.getElementById('principal-text');
    const rateRange = document.getElementById('rate-range');
    const rateText = document.getElementById('rate-text');
    const timeRange = document.getElementById('time-range');
    const timeText = document.getElementById('time-text');

    let myChart;

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Principal', 'Interest'],
                datasets: [{
                    data: [0, 0],
                    backgroundColor: ['#2563eb', '#10b981'],
                    hoverOffset: 20,
                    borderWidth: 0,
                    cutout: '82%',
                    borderRadius: 5
                }]
            },
            options: {
                plugins: { legend: { display: false }, tooltip: { enabled: true } },
                animation: { duration: 1000, easing: 'easeOutQuart' },
                maintainAspectRatio: false
            }
        });
    }

    function updateCalculations() {
        const P = parseFloat(principalRange.value);
        const r = parseFloat(rateRange.value) / 100;
        const t = parseFloat(timeRange.value);

        const total = P * Math.pow((1 + r), t);
        const interest = total - P;
        
        const pPerc = Math.round((P / total) * 100);
        const iPerc = 100 - pPerc;

        document.getElementById('res-invested').innerText = "₹ " + P.toLocaleString('en-IN');
        document.getElementById('res-returns').innerText = "₹ " + Math.round(interest).toLocaleString('en-IN');
        document.getElementById('res-total').innerText = "₹ " + Math.round(total).toLocaleString('en-IN');
        
        document.getElementById('perc-principal').innerText = pPerc + "%";
        document.getElementById('perc-interest').innerText = iPerc + "%";

        myChart.data.datasets[0].data = [P, interest];
        myChart.update();
    }

    function sync(range, text) {
        range.addEventListener('input', () => { text.value = range.value; updateCalculations(); });
        text.addEventListener('change', () => { 
            let val = Math.min(Math.max(text.value, range.min), range.max);
            text.value = val;
            range.value = val; 
            updateCalculations(); 
        });
    }

    sync(principalRange, principalText);
    sync(rateRange, rateText);
    sync(timeRange, timeText);

    initChart();
    updateCalculations();
</script>

</body>
</html>
